stages:
  - Pull and Build
  - deploy

build_image:
  stage: Pull and Build
  
  tags:
    - estate-fe

  cache:
    paths:
      - node_modules/
      - .npm/

  script:
    - cd /var/www/estate-fe
    - git restore .
    - git pull origin main
    - npm ci
    - npm run build
    - git restore .
  only:
    - main
